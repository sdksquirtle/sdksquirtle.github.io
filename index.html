<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime System V4 Ultra Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#070A12;
color:white;
overflow-x:hidden;
}

/* ===== BACKGROUND GRID ===== */
body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
background-size:60px 60px;
z-index:-2;
}

/* glowing aura */
body::after{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at 20% 20%, rgba(255,0,80,0.15), transparent 40%),
radial-gradient(circle at 80% 40%, rgba(255,200,0,0.12), transparent 45%),
radial-gradient(circle at 50% 80%, rgba(0,120,255,0.12), transparent 50%);
z-index:-1;
animation:move 10s infinite alternate;
}

@keyframes move{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

/* ===== LAYOUT ===== */
.container{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:260px;
height:100vh;
background:rgba(15,18,30,0.7);
backdrop-filter:blur(10px);
border-right:1px solid rgba(255,255,255,0.08);
padding:20px;
position:fixed;
}

.logo{
font-size:20px;
font-weight:800;
color:#FFD700;
margin-bottom:20px;
}

.menu a{
display:block;
color:#aaa;
text-decoration:none;
margin:14px 0;
transition:0.3s;
}

.menu a:hover{
color:#FFD700;
transform:translateX(5px);
}

/* MAIN */
.main{
margin-left:260px;
padding:30px;
width:100%;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.search{
padding:10px 14px;
border-radius:20px;
border:none;
outline:none;
background:#12182a;
color:white;
width:220px;
}

/* HERO */
.hero{
padding:40px;
border-radius:18px;
background:linear-gradient(135deg,#12182a,#0b0f1a);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.hero h1{
color:#FFD700;
font-size:42px;
}

.hero p{
color:#aaa;
margin-top:10px;
}

/* ===== RAIL SYSTEM ===== */
.rail{
margin-top:40px;
}

.rail h2{
margin-bottom:12px;
color:#ddd;
}

.row{
display:flex;
gap:16px;
overflow-x:auto;
scroll-behavior:smooth;
padding-bottom:10px;
}

.row::-webkit-scrollbar{display:none;}

/* ===== CARD ===== */
.card{
min-width:190px;
height:230px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
position:relative;
backdrop-filter:blur(8px);
}

.card:hover{
transform:translateY(-8px) scale(1.03);
border-color:#FFD700;
box-shadow:0 15px 40px rgba(255,215,0,0.15);
}

.tag{
position:absolute;
top:10px;
left:10px;
font-size:11px;
padding:4px 8px;
border-radius:10px;
background:#FFD700;
color:black;
font-weight:700;
}

/* ===== MODAL ===== */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
width:320px;
padding:20px;
border-radius:12px;
background:#12182a;
border:1px solid #FFD700;
text-align:center;
}

.modal h2{
color:#FFD700;
}

.close{
margin-top:15px;
padding:8px 12px;
background:#FFD700;
border:none;
cursor:pointer;
font-weight:700;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">ANIME V4</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Pirates</a>
<a href="#">Marines</a>
<a href="#">Legends</a>
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<h2>Ultra Anime System</h2>
<input class="search" id="search" placeholder="Search characters">
</div>

<div class="hero">
<h1>ANIME UNIVERSE V4</h1>
<p>Ultra Pro UI System with rails + modal + search</p>
</div>

<!-- RAIL -->
<div class="rail">
<h2>Pirates</h2>
<div class="row" id="grid">

<div class="card" onclick="openModal('Luffy','Pirate King')">
<div class="tag">Pirate</div>Luffy
</div>

<div class="card" onclick="openModal('Zoro','Sword Master')">
<div class="tag">Pirate</div>Zoro
</div>

<div class="card" onclick="openModal('Sanji','Cook')">
<div class="tag">Pirate</div>Sanji
</div>

</div>
</div>

<!-- RAIL -->
<div class="rail">
<h2>Marines</h2>
<div class="row">

<div class="card" onclick="openModal('Akainu','Fleet Admiral')">
<div class="tag">Marine</div>Akainu
</div>

<div class="card" onclick="openModal('Kizaru','Light Speed')">
<div class="tag">Marine</div>Kizaru
</div>

</div>
</div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h2 id="mname"></h2>
<p id="mdesc"></p>
<button class="close" onclick="closeModal()">Close</button>
</div>
</div>

<script>

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
let val=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"flex":"none";
});
});

/* MODAL */
function openModal(name,desc){
document.getElementById("modal").style.display="flex";
document.getElementById("mname").innerText=name;
document.getElementById("mdesc").innerText=desc;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
